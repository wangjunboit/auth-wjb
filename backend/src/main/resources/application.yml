server:
  port: 8080

spring:
  # 默认激活 local profile;真实连接信息放 application-local.yml(已被 .gitignore 排除,不入库)
  profiles:
    active: local
  datasource:
    # 占位默认值,真实地址/账号/密码请在 application-local.yml 覆盖
    url: jdbc:mysql://localhost:3306/auth_wjb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: your_db_user
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 604800          # token 有效期 7 天(秒)
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

# Knife4j 增强
knife4j:
  enable: true
