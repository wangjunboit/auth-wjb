server:
  port: 0

spring:
  # 测试关闭 Nacos,避免单测强依赖中间件在线
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/auth_wjb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: test
    password: test
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  is-log: false

# 测试用 dummy OAuth 配置(真实值来自 Nacos;测试不真正调用第三方)
oauth:
  github:
    client-id: dummy
    client-secret: dummy
    redirect-uri: http://localhost:5173/oauth/callback
    authorize-url: https://github.com/login/oauth/authorize
    token-url: https://github.com/login/oauth/access_token
    user-url: https://api.github.com/user
