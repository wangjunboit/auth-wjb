spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.0.230:8848
        username: nacos
        password: nacos
        namespace: ${NACOS_NAMESPACE:test}
      config:
        server-addr: 192.168.0.230:8848
        username: nacos
        password: nacos
        namespace: ${NACOS_NAMESPACE:test}
        file-extension: yml
        # 共享公共配置(Redis、Sa-Token)
        shared-configs:
          - data-id: auth-common.yml
            refresh: true
